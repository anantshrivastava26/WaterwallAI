services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
    depends_on:
      - qdrant
      - neo4j
    extra_hosts:
      # so the container can reach LM Studio on the host
      - "host.docker.internal:host-gateway"

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5.25-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev_password
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_storage:
  neo4j_data:
